name: release-native

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build:
    name: build (${{ matrix.os_key }}-${{ matrix.arch_key }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_key: linux
            arch_key: x64
            ext: ""
            use_cross: false
            target: ""
            allow_failure: false
          - runner: ubuntu-latest
            os_key: linux
            arch_key: arm64
            ext: ""
            use_cross: true
            target: aarch64-unknown-linux-gnu
            allow_failure: false
          - runner: macos-13
            os_key: darwin
            arch_key: x64
            ext: ""
            use_cross: false
            target: ""
            allow_failure: false
          - runner: macos-14
            os_key: darwin
            arch_key: arm64
            ext: ""
            use_cross: false
            target: ""
            allow_failure: false
          - runner: windows-latest
            os_key: win32
            arch_key: x64
            ext: ".exe"
            use_cross: false
            target: ""
            allow_failure: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Install cross (linux arm64)
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (release)
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --manifest-path cli/Cargo.toml --target "${{ matrix.target }}"
          else
            cargo build --release --locked --manifest-path cli/Cargo.toml
          fi

      - name: Package asset
        id: package
        shell: bash
        run: |
          set -euo pipefail
          ASSET_NAME="camoufox-browser-${{ matrix.os_key }}-${{ matrix.arch_key }}${{ matrix.ext }}"
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            SRC="cli/target/${{ matrix.target }}/release/camoufox-browser${{ matrix.ext }}"
          else
            SRC="cli/target/release/camoufox-browser${{ matrix.ext }}"
          fi
          if [ ! -f "$SRC" ]; then
            echo "Expected binary not found at: $SRC" >&2
            ls -la "cli/target/release" || true
            exit 1
          fi
          mkdir -p dist
          cp "$SRC" "dist/$ASSET_NAME"
          if [ "${{ matrix.ext }}" = "" ]; then
            chmod +x "dist/$ASSET_NAME" || true
          fi
          echo "asset_path=dist/$ASSET_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os_key }}-${{ matrix.arch_key }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: dist
          merge-multiple: true

      - name: List assets
        shell: bash
        run: ls -la dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*


name: publish-npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  TAG: ${{ github.event.inputs.tag || github.event.release.tag_name }}
  CAMOUFOX_BROWSER_SKIP_NATIVE_DOWNLOAD: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Refusing to publish: tag (${TAG}) != package.json version (${VERSION})" >&2
            exit 1
          fi

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

